<svg xmlns="http://www.w3.org/2000/svg" width="456" height="456" viewBox="0 0 456 456">
	<!-- Fond teal -->
	<rect width="456" height="456" fill="teal"/>

	<!-- Chapeau - deux traits reliés en haut, plus pointu et légèrement plus long -->
	<line x1="68" y1="104" x2="228" y2="60" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
	<line x1="228" y1="60" x2="388" y2="104" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

	<!-- Roue de vélo centrée plus bas -->
	<g transform="translate(228, 260)">
		<!-- Jante extérieure -->
		<circle cx="0" cy="0" r="160" fill="none" stroke="white" stroke-width="16"/>

		<!-- Moyeu central -->
		<circle cx="0" cy="0" r="16" fill="white"/>

		<!-- 6 rayons espacés uniformément (360/6 = 60 degrés) connectés au cercle -->
		<!-- Rayon 1 (0°) -->
		<line x1="0" y1="0" x2="0" y2="-160" stroke="white" stroke-width="16"/>

		<!-- Rayon 2 (60°) -->
		<line x1="0" y1="0" x2="138.6" y2="-80" stroke="white" stroke-width="16"/>

		<!-- Rayon 3 (120°) -->
		<line x1="0" y1="0" x2="138.6" y2="80" stroke="white" stroke-width="16"/>

		<!-- Rayon 4 (180°) -->
		<line x1="0" y1="0" x2="0" y2="160" stroke="white" stroke-width="16"/>

		<!-- Rayon 5 (240°) -->
		<line x1="0" y1="0" x2="-138.6" y2="80" stroke="white" stroke-width="16"/>

		<!-- Rayon 6 (300°) -->
		<line x1="0" y1="0" x2="-138.6" y2="-80" stroke="white" stroke-width="16"/>
	</g>
</svg>