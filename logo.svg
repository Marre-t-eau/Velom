<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fond teal -->
  <rect width="512" height="512" fill="teal"/>
  
  <!-- Chapeau - deux traits reliés en haut, centré et descendu, élargi x4 -->
  <line x1="56" y1="140" x2="256" y2="44" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="256" y1="44" x2="456" y2="140" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Roue de vélo centrée plus bas -->
  <g transform="translate(256, 288)">
    <!-- Jante extérieure -->
    <circle cx="0" cy="0" r="192" fill="none" stroke="white" stroke-width="16"/>
    
    <!-- Moyeu central -->
    <circle cx="0" cy="0" r="16" fill="white"/>
    
    <!-- 6 rayons espacés uniformément (360/6 = 60 degrés) connectés au cercle -->
    <!-- Rayon 1 (0°) -->
    <line x1="0" y1="0" x2="0" y2="-192" stroke="white" stroke-width="16"/>
    
    <!-- Rayon 2 (60°) -->
    <line x1="0" y1="0" x2="166.3" y2="-96" stroke="white" stroke-width="16"/>
    
    <!-- Rayon 3 (120°) -->
    <line x1="0" y1="0" x2="166.3" y2="96" stroke="white" stroke-width="16"/>
    
    <!-- Rayon 4 (180°) -->
    <line x1="0" y1="0" x2="0" y2="192" stroke="white" stroke-width="16"/>
    
    <!-- Rayon 5 (240°) -->
    <line x1="0" y1="0" x2="-166.3" y2="96" stroke="white" stroke-width="16"/>
    
    <!-- Rayon 6 (300°) -->
    <line x1="0" y1="0" x2="-166.3" y2="-96" stroke="white" stroke-width="16"/>
  </g>
</svg>